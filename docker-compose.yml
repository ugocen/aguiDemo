services:
  postgres:
    image: postgres:16
    container_name: agui-postgres
    environment:
      POSTGRES_USER: agui
      POSTGRES_PASSWORD: agui
      POSTGRES_DB: agui
    ports:
      - "5433:5432"
    volumes:
      - agui_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agui -d agui"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agui_pgdata:
