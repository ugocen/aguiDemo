backend:
  image: REPLACE_ME/agui-demo-backend:latest
  replicas: 2
  port: 8000
  # SQLite-on-a-volume mode (no RDS): set replicas: 1, persistence.enabled: true,
  # and env.DATABASE_URL=sqlite+aiosqlite:////data/agui.db. Needs the EBS CSI
  # driver + a default StorageClass. Single-writer, so keep replicas at 1.
  persistence:
    enabled: false
    size: 5Gi

frontend:
  image: REPLACE_ME/agui-demo-frontend:latest
  replicas: 2
  port: 3000

ingress:
  enabled: true
  className: alb
  # Single-host mode: leave host "" and apiHost empty to route by path on one host
  # (works with the raw ALB DNS, same-origin frontend). Two-host mode: set host to
  # the frontend domain and apiHost to the backend domain (cross-origin — set the
  # backend CORS_ALLOW_ORIGINS to the frontend origin, and build the frontend with
  # NEXT_PUBLIC_BACKEND_URL=https://<apiHost>).
  host: ""
  apiHost: ""
  # ACM certificate ARN (same region as the ALB). When set, the ALB gets an HTTPS
  # listener on 443 and redirects HTTP->HTTPS.
  certificateArn: ""

env:
  APP_ENV: production
  AGENT_MODE: langgraph
  AUTH_MODE: entra
  MARKETPLACE_STREAM_MODE: stream
  CORS_ALLOW_ORIGINS: https://agui-demo.example.com
  NEXT_PUBLIC_AUTH_MODE: entra

# Credentials are managed out-of-band so they never land in Helm values or
# release history: create the `<release>-secrets` Secret yourself (kubectl create
# secret / External Secrets) with the keys the app needs — DATABASE_URL,
# GEMINI_API_KEY (or MARKETPLACE_*), and ENTRA_* when AUTH_MODE=entra. Leaving
# this empty makes the chart skip the Secret (see templates/config.yaml).
secrets: {}
